name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*", "b*"]
  workflow_dispatch:
    inputs:
      llama_cpp_version:
        description: "llama.cpp version/tag to build (e.g. master, b5000)"
        required: false
        default: "master"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image_name: llama.cpp-rpc-server
            dockerfile: Dockerfile.rpc-server
          - image_name: llama.cpp-master
            dockerfile: Dockerfile.master
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine llama.cpp version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "llama_version=${{ github.event.inputs.llama_cpp_version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "llama_version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "llama_version=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.llama_version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/s390x
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LLAMA_CPP_VERSION=${{ steps.version.outputs.llama_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
